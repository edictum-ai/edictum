name: Notify Parity

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

jobs:
  notify:
    name: Create port tracking issues
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'feature-parity')
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: edictum-ai
          repositories: edictum-ts,edictum-go

      - name: Create TypeScript tracking issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh issue create --repo edictum-ai/edictum-ts \
            --title "Port: ${PR_TITLE}" \
            --label "parity:blocking,feature-parity" \
            --body "Python reference landed in ${PR_URL}

          Port this feature to TypeScript with matching behavior.

          ## Checklist
          - [ ] Implementation matches Python API surface
          - [ ] Shared behavioral fixtures pass
          - [ ] TypeScript-native tests written
          - [ ] Security tests if touching security boundary"

      - name: Create Go tracking issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh issue create --repo edictum-ai/edictum-go \
            --title "Port: ${PR_TITLE}" \
            --label "parity:blocking,feature-parity" \
            --body "Python reference landed in ${PR_URL}

          Port this feature to Go with matching behavior.

          ## Checklist
          - [ ] Implementation matches Python API surface
          - [ ] Shared behavioral fixtures pass
          - [ ] Go-native tests written
          - [ ] Race detector passes
          - [ ] Security tests if touching security boundary"
