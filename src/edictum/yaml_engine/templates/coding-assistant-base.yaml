apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: coding-assistant-base
  description: >
    Opinionated starting rules for coding assistant runtime enforcement.
    Covers secret file access, destructive commands, git safety,
    system modifications, and package installations.
    Customize to fit your workflow — this file is yours.

# Observe mode logs what WOULD be blocked without blocking anything.
# Switch to 'enforce' when you're confident in your rule set.
defaults:
  mode: observe

tools:
  Bash:
    side_effect: irreversible
  Read:
    side_effect: read
  Write:
    side_effect: irreversible
  Edit:
    side_effect: irreversible
  Glob:
    side_effect: read
  Grep:
    side_effect: read
  WebFetch:
    side_effect: read
  WebSearch:
    side_effect: read
  NotebookEdit:
    side_effect: irreversible
  Task:
    side_effect: irreversible
  "mcp_*":
    side_effect: irreversible

rules:
  # -- Secret Protection -------------------------------------------------------
  # One rule per tool — Python fnmatch does NOT support {a,b,c} brace
  # expansion, so a single `tool: '{Read,Write,Edit}'` would never match.
  # Bash/shell access to secrets is covered by block-env-dump-commands below.
  - id: block-secret-file-reads
    type: pre
    tool: Read
    when:
      args.file_path:
        matches_any:
          - '\.env$'
          - '\.env\.\w+$'
          - 'credentials\.json$'
          - '\.pem$'
          - '\.key$'
          - '\.secret$'
          - '\.ssh/'
          - '\.aws/'
          - '\.gcloud/'
          - '\.docker/config\.json$'
          - '\.npmrc$'
          - '\.pypirc$'
    then:
      action: block
      message: "Blocked: this file may contain secrets"
      tags: [security, secrets]

  - id: block-secret-file-writes
    type: pre
    tool: Write
    when:
      args.file_path:
        matches_any:
          - '\.env$'
          - '\.env\.\w+$'
          - 'credentials\.json$'
          - '\.pem$'
          - '\.key$'
          - '\.secret$'
          - '\.ssh/'
          - '\.aws/'
          - '\.gcloud/'
          - '\.docker/config\.json$'
          - '\.npmrc$'
          - '\.pypirc$'
    then:
      action: block
      message: "Blocked: this file may contain secrets"
      tags: [security, secrets]

  - id: block-secret-file-edits
    type: pre
    tool: Edit
    when:
      args.file_path:
        matches_any:
          - '\.env$'
          - '\.env\.\w+$'
          - 'credentials\.json$'
          - '\.pem$'
          - '\.key$'
          - '\.secret$'
          - '\.ssh/'
          - '\.aws/'
          - '\.gcloud/'
          - '\.docker/config\.json$'
          - '\.npmrc$'
          - '\.pypirc$'
    then:
      action: block
      message: "Blocked: this file may contain secrets"
      tags: [security, secrets]

  - id: block-env-dump-commands
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - '^(printenv|env|set)(\s|$)'
          - 'cat\s+\.env'
          - 'echo\s+\$(AWS_SECRET_ACCESS_KEY|AWS_SESSION_TOKEN|API_KEY|SECRET_KEY|DATABASE_URL|DB_PASSWORD|PRIVATE_KEY|TOKEN|OPENAI_API_KEY|ANTHROPIC_API_KEY|GITHUB_TOKEN)'
          - 'export\s+-p'
    then:
      action: block
      message: "Blocked: environment variable access is restricted"
      tags: [security, secrets]

  # -- Destructive Command Protection ------------------------------------------
  - id: block-destructive-commands
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - 'rm\s+-rf\s+/'
          - 'rm\s+-rf\s+~'
          - 'rm\s+-rf\s+\*'
          - '^mkfs\b'
          - '^dd\s+if='
          - 'chmod\s+777'
          - ':(){.*};:'
    then:
      action: block
      message: "Blocked: destructive command"
      tags: [security, destructive]

  # -- Git Safety ---------------------------------------------------------------
  - id: block-dangerous-git
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - 'git\s+push\s+.*--force'
          - 'git\s+push\s+-f\b'
          - 'git\s+reset\s+--hard'
          - 'git\s+clean\s+-f'
          - 'git\s+checkout\s+\.'
          - 'git\s+branch\s+-D'
    then:
      action: block
      message: "Blocked: destructive git operation"
      tags: [git, destructive]

  # -- Scope Enforcement --------------------------------------------------------
  # NOTE: Scope enforcement is handled programmatically in gate/check.py,
  # NOT via YAML rules. The _check_scope() function compares
  # os.path.realpath(file_path) against the working directory from stdin.
  # This runs AFTER standard rule evaluation as an additional gate-level
  # check. It cannot be expressed in YAML because cwd is a runtime value
  # from the assistant's stdin, not a rule field.

  - id: block-system-commands
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - '^sudo\b'
          - 'systemctl\b'
          - 'launchctl\b'
          - '/etc/'
          - '/usr/local/bin/'
    then:
      action: block
      message: "Blocked: system modification"
      tags: [security, system]

  # -- Package Install Protection -----------------------------------------------
  - id: block-package-installs
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - 'npm\s+install\b'
          - 'pnpm\s+(add|install)\b'
          - 'yarn\s+add\b'
          - 'pip\s+install\b'
          - 'brew\s+install\b'
          - 'cargo\s+install\b'
          - 'go\s+install\b'
    then:
      action: block
      message: "Blocked: package installation"
      tags: [audit, packages]

  # -- Gate Self-Protection ----------------------------------------------------
  # Prevent the governed assistant from disabling or modifying Gate.
  # Gate configuration is managed by humans in a terminal — if you need
  # changes, tell the human what to modify and where.

  - id: block-gate-config-reads
    mode: enforce
    type: pre
    tool: Read
    when:
      args.file_path:
        matches_any:
          - '\.edictum/'
          - '\.claude/settings\.json$'
          - '\.cursor/hooks\.json$'
          - '\.gemini/settings\.json$'
    then:
      action: block
      message: >-
        Blocked: this is a Gate infrastructure file. Gate configuration is
        managed by humans, not by the governed assistant. Tell the human
        what needs to change and they will update it in their terminal.
      tags: [security, gate-protection]

  - id: block-gate-config-writes
    mode: enforce
    type: pre
    tool: Write
    when:
      args.file_path:
        matches_any:
          - '\.edictum/'
          - '\.claude/settings\.json$'
          - '\.cursor/hooks\.json$'
          - '\.gemini/settings\.json$'
    then:
      action: block
      message: >-
        Blocked: this is a Gate infrastructure file. Gate configuration is
        managed by humans, not by the governed assistant. Tell the human
        what needs to change and they will update it in their terminal.
      tags: [security, gate-protection]

  - id: block-gate-config-edits
    mode: enforce
    type: pre
    tool: Edit
    when:
      args.file_path:
        matches_any:
          - '\.edictum/'
          - '\.claude/settings\.json$'
          - '\.cursor/hooks\.json$'
          - '\.gemini/settings\.json$'
    then:
      action: block
      message: >-
        Blocked: this is a Gate infrastructure file. Gate configuration is
        managed by humans, not by the governed assistant. Tell the human
        what needs to change and they will update it in their terminal.
      tags: [security, gate-protection]

  - id: block-gate-config-bash-tampering
    mode: enforce
    type: pre
    tool: Bash
    when:
      args.command:
        matches_any:
          - '\.edictum/'
          - 'settings\.json'
          - 'hooks\.json'
          - 'edictum\s+gate\s+uninstall'
    then:
      action: block
      message: >-
        Blocked: Gate infrastructure cannot be modified by the assistant.
        Gate configuration is managed by humans in a terminal. Tell the
        human what command to run and they will execute it themselves.
      tags: [security, gate-protection]
