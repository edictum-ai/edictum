apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: post-redact

defaults:
  mode: enforce

rules:
  - id: redact-pii
    type: post
    tool: "*"
    when:
      output.text:
        matches: '\b\d{3}-\d{2}-\d{4}\b'
    then:
      action: redact
      message: "PII detected — redacting output."
