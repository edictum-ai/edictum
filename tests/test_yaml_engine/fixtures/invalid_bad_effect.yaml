apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: bad-action

defaults:
  mode: enforce

rules:
  - id: bad-post
    type: post
    tool: "*"
    when:
      output.text:
        contains: "secret"
    then:
      action: explode
      message: "This should fail — explode is not a valid action."
