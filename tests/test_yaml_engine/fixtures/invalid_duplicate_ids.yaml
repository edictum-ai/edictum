apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: dup-ids

defaults:
  mode: enforce

rules:
  - id: same-id
    type: pre
    tool: read_file
    when:
      args.path:
        contains: ".env"
    then:
      action: block
      message: "first"

  - id: same-id
    type: pre
    tool: write_file
    when:
      args.path:
        contains: ".env"
    then:
      action: block
      message: "second — duplicate ID"
