apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: tools-test

defaults:
  mode: enforce

tools:
  read_config:
    side_effect: read
  get_weather:
    side_effect: pure
    idempotent: true
  deploy:
    side_effect: irreversible

rules:
  - id: block-sensitive-reads
    type: pre
    tool: read_file
    when:
      args.path:
        contains: ".env"
    then:
      action: block
      message: "Denied."
