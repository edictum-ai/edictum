apiVersion: edictum/v1
kind: Ruleset

metadata:
  name: tools-redact

defaults:
  mode: enforce

tools:
  read_config:
    side_effect: read
  search_db:
    side_effect: pure

rules:
  - id: redact-secrets
    type: post
    tool: "*"
    when:
      output.text:
        matches: 'sk-[a-zA-Z0-9]{10,}'
    then:
      action: redact
      message: "API key detected — redacting."

  - id: block-pii
    type: post
    tool: "*"
    when:
      output.text:
        matches: '\b\d{3}-\d{2}-\d{4}\b'
    then:
      action: block
      message: "PII detected — suppressing output."
